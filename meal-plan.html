<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <title>Planer obroka • Smart Meal Planner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/icon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/icon-180.png" />
  <meta name="theme-color" content="#056135" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Meal Planner" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

  <main class="app-main container py-4">
    <header class="page-header">
      <span class="page-eyebrow">Nedeljni plan</span>
      <h1 class="page-title">📆 Nedeljni plan obroka</h1>
      <p class="page-subtitle">Organizuj doručak, ručak i večeru kroz čist i pregledan raspored.</p>
    </header>

    <section class="table-shell mb-3">
      <div class="table-responsive">
        <table class="table align-middle text-center">
          <thead>
            <tr>
              <th>Dan</th>
              <th>Doručak</th>
              <th>Ručak</th>
              <th>Večera</th>
            </tr>
          </thead>
          <tbody id="mealPlanTable"></tbody>
        </table>
      </div>

      <div class="d-flex flex-wrap gap-2 mt-3">
        <button class="btn btn-outline-primary" onclick="saveMealPlan()">💾 Sačuvaj plan</button>
        <button class="btn btn-outline-warning" onclick="generateShoppingList()">🛒 Lista za kupovinu</button>
      </div>
      <p class="mt-3 text-success d-none" id="saveMessage">✅ Plan sačuvan!</p>
    </section>

  </main>

  <footer class="footer">🥗 Saki & Peki • Smart Meal Planner</footer>
  <nav class="mobile-nav" aria-label="Glavna navigacija">
    <a href="app.html"><span class="material-icons">home</span>Pocetna</a>
    <a href="recipes.html"><span class="material-icons">restaurant_menu</span>Recepti</a>
    <a href="meal-plan.html" class="active"><span class="material-icons">calendar_month</span>Plan</a>
    <a href="shopping-list.html"><span class="material-icons">shopping_cart</span>Kupovina</a>
    <a href="settings.html"><span class="material-icons">settings</span>Podesavanja</a>
  </nav>

  <script type="module" src="js/meal-plan.js"></script>
  <script type="module" src="js/main.js"></script>
  <script type="module" src="js/theme.js"></script>
  <script type="module" src="js/pwa.js"></script>
</body>

</html>
