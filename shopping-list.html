<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <title>Lista za kupovinu • Smart Meal Planner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/icon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/icon-180.png" />
  <meta name="theme-color" content="#056135" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Meal Planner" />
</head>
<body>

  <main class="app-main container py-4">
    <header class="page-header">
      <span class="page-eyebrow">Smart Groceries</span>
      <h1 class="page-title">🛒 Lista za kupovinu</h1>
      <p class="page-subtitle">Brza lista sastojaka na osnovu recepata i stanja inventara.</p>
    </header>

    <section class="list-shell mb-3">
      <div class="shopping-toolbar mb-3">
        <div id="shoppingListMeta" class="shopping-meta"></div>
        <div class="d-flex flex-wrap gap-2">
          <button id="finishShopping" class="btn btn-success" type="button">Zavrsena kupovina</button>
          <button id="clearBoughtItems" class="btn btn-outline-secondary" type="button">Sakrij kupljeno</button>
          <button id="resetShoppingList" class="btn btn-outline-primary" type="button">Osvezi listu</button>
        </div>
      </div>
      <div id="shoppingListContainer" class="mb-1"></div>
    </section>

    <a href="index.html" class="btn btn-outline-dark">← Nazad na početnu</a>
  </main>

  <button id="backToTop" class="btn btn-primary" aria-label="Vratite se na vrh">↑</button>
  <footer class="footer">🥗 Saki & Peki • Smart Meal Planner</footer>

  <nav class="mobile-nav" aria-label="Glavna navigacija">
    <a href="index.html"><span class="material-icons">home</span>Pocetna</a>
    <a href="recipes.html"><span class="material-icons">restaurant_menu</span>Recepti</a>
    <a href="meal-plan.html"><span class="material-icons">calendar_month</span>Plan</a>
    <a href="shopping-list.html" class="active"><span class="material-icons">shopping_cart</span>Kupovina</a>
    <a href="settings.html"><span class="material-icons">settings</span>Podesavanja</a>
  </nav>

  <script type="module" src="js/shopping.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/pwa.js"></script>
</body>

</html>
