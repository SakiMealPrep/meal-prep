<!DOCTYPE html>
<html lang="sr">

<head>
  <meta charset="UTF-8" />
  <title>Recepti • Smart Meal Planner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/icon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/icon-180.png" />
  <meta name="theme-color" content="#056135" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Meal Planner" />
</head>

<body>

  <main class="app-main container py-4">
    <header class="page-header">
      <span class="page-eyebrow">Recipe Library</span>
      <h1 class="page-title">🍽️ Pregled recepata</h1>
      <p class="page-subtitle">Filtriraj i pronađi obroke koji prate tvoj cilj.</p>
    </header>

    <section class="section-card mb-3">
      <div class="mb-3 small">
        <span class="badge badge-goal gubitak">gubitak</span> = <span class="text-danger">mršavljenje</span>,
        <span class="badge badge-goal odrzavanje">održavanje</span> = <span class="text-success">balans</span>
      </div>

      <div class="filter-row mb-3">
        <select id="mealFilter" class="form-select w-auto">
          <option value="">Svi obroci</option>
          <option value="doručak">Doručak</option>
          <option value="ručak">Ručak</option>
          <option value="večera">Večera</option>
        </select>
        <select id="goalFilter" class="form-select w-auto">
          <option value="">Svi ciljevi</option>
          <option value="gubitak">Gubitak</option>
          <option value="odrzavanje">Održavanje</option>
        </select>
        <div class="form-check d-flex align-items-center px-2">
          <input class="form-check-input" type="checkbox" id="filterByInventory" />
          <label class="form-check-label ms-2" for="filterByInventory">Prikaži samo recepte za koje imam sve</label>
        </div>
        <input type="search" id="searchInput" class="form-control flex-grow-1" placeholder="Pretraži po nazivu ili sastojku" />
      </div>

      <div id="recipeList" class="row"></div>
    </section>

  </main>

  <footer class="footer">PEKI &amp; SAKI • SMART MEAL PLANNER</footer>

  <nav class="mobile-nav" aria-label="Glavna navigacija">
    <a href="app.html"><span class="material-icons">home</span>Pocetna</a>
    <a href="recipes.html" class="active"><span class="material-icons">restaurant_menu</span>Recepti</a>
    <a href="meal-plan.html"><span class="material-icons">calendar_month</span>Plan</a>
    <a href="shopping-list.html"><span class="material-icons">shopping_cart</span>Kupovina</a>
    <a href="settings.html"><span class="material-icons">settings</span>Podesavanja</a>
  </nav>

  <script type="module" src="js/recipes.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/main.js"></script>
  <script type="module" src="js/theme.js"></script>
  <script type="module" src="js/pwa.js"></script>
</body>

</html>
