<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <title>Household • Smart Meal Planner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/icon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/icon-180.png" />
  <meta name="theme-color" content="#056135" />
</head>
<body>
  <main class="app-main container py-4" style="max-width: 720px;">
    <header class="page-header">
      <span class="page-eyebrow">Household</span>
      <h1 class="page-title">Tvoj household</h1>
      <p class="page-subtitle">Napravi zajednicki dom za inventar, plan obroka i kupovinu.</p>
    </header>

    <section class="settings-grid mb-3">
      <article class="settings-panel">
        <div>
          <span class="material-icons settings-icon">home</span>
          <h2>Napravi household</h2>
          <p>Ovo ce biti zajednicki prostor za sve clanove domacinstva.</p>
        </div>
        <form id="householdForm">
          <label for="householdName" class="form-label">Naziv</label>
          <input id="householdName" class="form-control mb-3" value="Saki & Peki" required />
          <button class="btn btn-success w-100" type="submit">Napravi household</button>
        </form>
      </article>

      <article class="settings-panel">
        <div>
          <span class="material-icons settings-icon">link</span>
          <h2>Imas pozivnicu?</h2>
          <p>Nalepi invite link ili token koji si dobio/la.</p>
        </div>
        <form id="joinForm">
          <label for="inviteToken" class="form-label">Invite token</label>
          <input id="inviteToken" class="form-control mb-3" />
          <button class="btn btn-outline-primary w-100" type="submit">Pridruzi se</button>
        </form>
      </article>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
  <script src="js/theme.js"></script>
  <script type="module" src="js/household.js"></script>
  <script src="js/pwa.js"></script>
</body>
</html>
