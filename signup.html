<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <title>Signup • Smart Meal Planner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/icon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/icon-180.png" />
  <meta name="theme-color" content="#056135" />
</head>
<body>
  <main class="app-main container py-4" style="max-width: 560px;">
    <header class="page-header">
      <span class="page-eyebrow">Account</span>
      <h1 class="page-title">Registracija</h1>
      <p id="signupSubtitle" class="page-subtitle">Napravi nalog i povezi se sa svojim household-om.</p>
    </header>

    <section class="form-shell">
      <form id="signupForm" autocomplete="on">
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input id="email" name="email" class="form-control" type="email" required />
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Lozinka</label>
          <input id="password" name="password" class="form-control" type="password" required minlength="6" />
        </div>
        <button class="btn btn-success w-100" type="submit">Registruj se</button>
      </form>
      <p class="mt-3 mb-0 text-muted">Vec imas nalog? <a id="loginLink" href="login.html">Prijavi se</a></p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/main.js"></script>
  <script type="module" src="js/theme.js"></script>
  <script type="module" src="js/signup.js"></script>
  <script type="module" src="js/pwa.js"></script>
</body>
</html>
