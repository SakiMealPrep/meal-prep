<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <title>Inventar • Smart Meal Planner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/icon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/icon-180.png" />
  <meta name="theme-color" content="#056135" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Meal Planner" />
</head>
<body>

  <main class="app-main container py-4">
    <header class="page-header">
      <span class="page-eyebrow">Kitchen Inventory</span>
      <h1 class="page-title">🧺 Stanje u frižideru</h1>
      <p class="page-subtitle">Označi sastojke koje imaš kako bi filteri i kupovina bili tačni.</p>
    </header>

    <section class="section-card mb-3">
      <div class="inventory-toolbar mb-3">
        <input id="inventorySearch" class="form-control" type="search" placeholder="Pretrazi sastojke" />
        <button id="selectAllInventory" class="btn btn-outline-primary" type="button">Oznaci sve</button>
        <button class="btn btn-outline-secondary" type="button" onclick="clearInventory()">Ponisti sve</button>
      </div>
      <div id="inventorySummary" class="inventory-summary mb-3"></div>
      <div id="inventoryList" class="row"></div>
    </section>

  </main>

  <button id="backToTop" class="btn btn-primary" aria-label="Vratite se na vrh">↑</button>
  <footer class="footer">🥗 Saki & Peki • Smart Meal Planner</footer>

  <nav class="mobile-nav" aria-label="Glavna navigacija">
    <a href="index.html"><span class="material-icons">home</span>Pocetna</a>
    <a href="recipes.html"><span class="material-icons">restaurant_menu</span>Recepti</a>
    <a href="meal-plan.html"><span class="material-icons">calendar_month</span>Plan</a>
    <a href="shopping-list.html"><span class="material-icons">shopping_cart</span>Kupovina</a>
    <a href="settings.html"><span class="material-icons">settings</span>Podesavanja</a>
  </nav>

  <script type="module" src="js/inventory.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/pwa.js"></script>
</body>

</html>
